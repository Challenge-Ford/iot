name: Build & Test

# Reusable workflow: builds every entrypoint, vets and tests the code, and
# validates the Terraform in infra/. Called by the feature, development and
# production pipelines so validation is identical everywhere.
on:
  workflow_call:

jobs:
  build-test:
    name: Build, vet & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Build entrypoints
        run: |
          go build -o /tmp/iot-mqtt-guard ./cmd/mqtt-guard
          go build -o /tmp/iot-mqtt-listener ./cmd/mqtt-listener
          go build -o /tmp/iot-cli ./cmd/cli

      - name: Test
        run: go test -race ./...

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate
