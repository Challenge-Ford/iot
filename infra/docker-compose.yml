name: torque-iot

services:
  postgres:
    image: postgres:17.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: torque
      POSTGRES_PASSWORD: torque
      POSTGRES_DB: torque
    ports:
      - "5434:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d torque -U torque
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - torque-iot

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: torque
      RABBITMQ_DEFAULT_PASS: torque
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - torque-iot

  step-ca:
    image: smallstep/step-ca:latest
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: "Torque IoT CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_ADDRESS: ":9000"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "torque"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/ca-password
      DOCKER_STEPCA_INIT_PROVISIONER_PASSWORD_FILE: /run/secrets/ca-password
    ports:
      - "9001:9000"
    volumes:
      - step-ca-data:/home/step
      - ./step-ca/password.txt:/run/secrets/ca-password:ro
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url=https://localhost:9000", "--root=/home/step/certs/root_ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - torque-iot

  emqx:
    image: emqx/emqx:5.8
    restart: unless-stopped
    hostname: emqx
    environment:
      EMQX_NODE__NAME: "emqx@emqx"
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18084:18083"
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - emqx-data:/opt/emqx/data
      - ../certs/emqx:/opt/emqx/etc/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - torque-iot
    depends_on:
      - step-ca

networks:
  torque-iot:
    name: torque-iot

volumes:
  postgres-data:
  rabbitmq-data:
  emqx-data:
  step-ca-data:
