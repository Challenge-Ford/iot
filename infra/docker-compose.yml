name: torque-iot

services:
  postgres:
    image: postgres:17.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: torque
      POSTGRES_PASSWORD: torque
      POSTGRES_DB: torque
    ports:
      - "5434:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d torque -U torque
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - torque-iot

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: torque
      RABBITMQ_DEFAULT_PASS: torque
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - torque-iot

  vault:
    image: hashicorp/vault:latest
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: torque
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8201:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - torque-iot

  vault-setup:
    image: hashicorp/vault:latest
    restart: on-failure
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: torque
    volumes:
      - ./vault/setup.sh:/setup.sh:ro
      - vault-ca:/vault-ca
    command: sh /setup.sh
    networks:
      - torque-iot
    depends_on:
      vault:
        condition: service_healthy

  emqx:
    image: emqx/emqx:5.8
    restart: unless-stopped
    hostname: emqx
    environment:
      EMQX_NODE__NAME: "emqx@emqx"
    ports:
      - "1884:1883"
      - "8884:8883"
      - "18084:18083"
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - emqx-data:/opt/emqx/data
      - vault-ca:/opt/emqx/etc/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - torque-iot
    depends_on:
      vault-setup:
        condition: service_completed_successfully

networks:
  torque-iot:
    name: torque-iot

volumes:
  postgres-data:
  rabbitmq-data:
  emqx-data:
  vault-ca:
